<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>儲三翔老師｜教學儀表板</title>
    <meta name="description" content="儲三翔老師的教學工具儀表板入口，快速前往數位名片、抽點器與連結牆。">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="dashboard-shell">
      <section class="dashboard" aria-labelledby="dashboard-title">
        <header class="topbar">
          <div>
            <p class="eyebrow">教師工具入口</p>
            <h1 id="dashboard-title">儲三翔老師</h1>
          </div>
          <p class="role">羅東國小資訊組長</p>
        </header>

        <section class="hero">
          <p class="hero-label">Dashboard</p>
          <h2>教學儀表板</h2>
          <p>把常用的教學頁面集中在同一個入口，手機與電腦都能快速開啟。</p>
        </section>

        <nav class="tool-grid" aria-label="教學工具">
          <a class="tool-card profile" href="../教師個人數位名片/">
            <span class="tool-icon" aria-hidden="true">名</span>
            <span>
              <strong>教師數位名片</strong>
              <small>關於我、教學理念與課程連結</small>
            </span>
          </a>

          <a class="tool-card picker" href="../網頁抽點器/">
            <span class="tool-icon" aria-hidden="true">抽</span>
            <span>
              <strong>網頁抽點器</strong>
              <small>上傳班級名單後快速抽點</small>
            </span>
          </a>

          <a class="tool-card links" href="../手機常用連結/">
            <span class="tool-icon" aria-hidden="true">連</span>
            <span>
              <strong>連結牆</strong>
              <small>學校官網、快樂 e 學院與常用入口</small>
            </span>
          </a>
        </nav>

        <footer class="footer">
          <span>更新日期</span>
          <time datetime="2026-05-07">2026-05-07</time>
        </footer>
      </section>
    </main>
  </body>
</html>
