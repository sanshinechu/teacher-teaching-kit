<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>學思達課堂任務設計器</title>
    <meta name="description" content="產生三軌差異化任務、學思達五環課堂流程與 Exit Ticket 的前端工具。">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <a class="back-link" href="../儀表板入口/">返回儀表板</a>
        <div>
          <p class="eyebrow">Sharestart Lesson Designer</p>
          <h1>學思達課堂任務設計器</h1>
          <p class="lead">老師輸入課程資料後，先產生 S1 / S2 / S3 三軌差異化任務，也能延伸整理課堂流程與 Exit Ticket。</p>
        </div>
      </header>

      <section class="workspace" aria-label="課程資料輸入">
        <form class="lesson-form" id="lessonForm">
          <div class="form-grid">
            <label>
              <span>課程主題</span>
              <input id="topic" name="topic" type="text" placeholder="例：海洋污染、過去式、閱讀理解、情緒教育">
            </label>
            <label>
              <span>核心問題</span>
              <input id="essentialQuestion" name="essentialQuestion" type="text" placeholder="例：Why did the beach change?">
            </label>
            <label>
              <span>年級</span>
              <input id="grade" name="grade" type="text" placeholder="例：國小高年級、國中七年級、國中八年級">
            </label>
            <label>
              <span>學習目標</span>
              <textarea id="learningGoal" name="learningGoal" rows="4" placeholder="例：學生能用過去式描述環境變化。"></textarea>
            </label>
            <label>
              <span>教材內容</span>
              <textarea id="materials" name="materials" rows="4" placeholder="可貼上課文、對話、短文或任務素材。"></textarea>
            </label>
            <label>
              <span>任務類型</span>
              <select id="taskType" name="taskType">
                <option value="閱讀理解">閱讀理解</option>
                <option value="口說討論">口說討論</option>
                <option value="寫作">寫作</option>
                <option value="文法練習">文法練習</option>
                <option value="SEL 反思">SEL 反思</option>
              </select>
            </label>
            <label class="checkbox-label">
              <input id="sentenceSupport" name="sentenceSupport" type="checkbox" value="yes">
              <span>產生英文句型支架</span>
            </label>
            <label>
              <span>上課時間</span>
              <select id="duration" name="duration">
                <option value="40">40 分鐘</option>
                <option value="45">45 分鐘</option>
                <option value="80">80 分鐘</option>
              </select>
            </label>
          </div>

          <div class="action-row">
            <button class="primary-button" type="submit">產生三軌任務</button>
            <button class="secondary-button" id="resetButton" type="button">清空重來</button>
          </div>
        </form>
      </section>

      <section class="module-tabs" aria-label="功能切換">
        <button class="tab-button is-active" type="button" data-panel="tasksPanel">三軌任務產生器</button>
        <button class="tab-button" type="button" data-panel="flowPanel">課堂流程產生器</button>
        <button class="tab-button" type="button" data-panel="ticketPanel">Exit Ticket 產生器</button>
      </section>

      <section class="output-area" aria-live="polite">
        <article class="output-panel is-active" id="tasksPanel">
          <div class="panel-heading">
            <div>
              <p class="section-label">Differentiated Tasks</p>
              <h2>三軌差異化任務</h2>
            </div>
            <button class="copy-button" id="copyTasksButton" type="button">複製結果</button>
          </div>
          <p class="copy-status" id="copyStatus" aria-live="polite"></p>
          <div class="task-grid" id="taskOutput"></div>
        </article>

        <article class="output-panel" id="flowPanel">
          <div class="panel-heading">
            <div>
              <p class="section-label">Sharestart Flow</p>
              <h2>課堂流程產生器</h2>
            </div>
          </div>
          <form class="lesson-form flow-form" id="flowForm">
            <div class="form-grid">
              <label>
                <span>課程主題</span>
                <input id="flowTopic" name="flowTopic" type="text" placeholder="例：海洋污染">
              </label>
              <label>
                <span>課程總時間</span>
                <input id="flowDuration" name="flowDuration" type="number" min="20" max="120" step="5" placeholder="例：45">
              </label>
              <label>
                <span>班級狀態</span>
                <select id="classStatus" name="classStatus">
                  <option value="安靜型">安靜型</option>
                  <option value="活潑型">活潑型</option>
                  <option value="程度落差大">程度落差大</option>
                  <option value="需要更多秩序提醒">需要更多秩序提醒</option>
                </select>
              </label>
              <label>
                <span>教學目標</span>
                <textarea id="flowGoal" name="flowGoal" rows="4" placeholder="例：學生能用過去式描述環境變化。"></textarea>
              </label>
              <label>
                <span>核心問題</span>
                <textarea id="flowQuestion" name="flowQuestion" rows="4" placeholder="例：Why did the beach change?"></textarea>
              </label>
              <div class="option-stack" aria-label="流程選項">
                <label class="checkbox-label">
                  <input id="useThreeTracks" name="useThreeTracks" type="checkbox" value="yes">
                  <span>使用三軌任務</span>
                </label>
                <label class="checkbox-label">
                  <input id="useGroupDiscussion" name="useGroupDiscussion" type="checkbox" value="yes">
                  <span>加入小組討論</span>
                </label>
                <label class="checkbox-label">
                  <input id="useExitTicket" name="useExitTicket" type="checkbox" value="yes">
                  <span>加入 Exit Ticket</span>
                </label>
              </div>
            </div>

            <div class="action-row">
              <button class="primary-button" type="submit">產生課堂流程</button>
              <button class="secondary-button" id="addFlowRowButton" type="button">新增步驟</button>
            </div>
          </form>

          <div class="table-scroll" id="flowTableWrap">
            <table class="flow-table">
              <thead>
                <tr>
                  <th>時間</th>
                  <th>學思達階段</th>
                  <th>教師任務</th>
                  <th>學生任務</th>
                  <th>可使用工具</th>
                  <th>教師提醒語</th>
                  <th>差異化提醒</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="flowOutput"></tbody>
            </table>
          </div>
        </article>

        <article class="output-panel" id="ticketPanel">
          <div class="panel-heading">
            <p class="section-label">Learning Feedback</p>
            <h2>Exit Ticket</h2>
          </div>
          <div class="ticket-list" id="ticketOutput"></div>
        </article>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
