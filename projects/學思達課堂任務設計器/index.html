<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>學思達課堂任務設計器</title>
    <meta name="description" content="產生三軌差異化任務、學思達五環課堂流程與 Exit Ticket 的前端工具。">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <a class="back-link" href="../儀表板入口/">返回儀表板</a>
        <div>
          <p class="eyebrow">Sharestart Lesson Designer</p>
          <h1>學思達課堂任務設計器</h1>
          <p class="lead">用同一份課程資料，快速整理三軌任務、一節課流程與課後 Exit Ticket。</p>
        </div>
      </header>

      <section class="workspace" aria-label="課程資料輸入">
        <form class="lesson-form" id="lessonForm">
          <div class="form-grid">
            <label>
              <span>課程主題</span>
              <input id="topic" name="topic" type="text" placeholder="例：Scratch 條件判斷與碰撞偵測">
            </label>
            <label>
              <span>年級與科目</span>
              <input id="grade" name="grade" type="text" placeholder="例：六年級資訊課">
            </label>
            <label>
              <span>上課時間</span>
              <select id="duration" name="duration">
                <option value="40">40 分鐘</option>
                <option value="45">45 分鐘</option>
                <option value="80">80 分鐘</option>
              </select>
            </label>
            <label>
              <span>學生程度描述</span>
              <textarea id="studentProfile" name="studentProfile" rows="4" placeholder="例：多數學生會拖拉積木，少部分需要步驟提示，幾位學生可以挑戰加分任務。"></textarea>
            </label>
            <label>
              <span>本節課目標</span>
              <textarea id="learningGoal" name="learningGoal" rows="4" placeholder="例：學生能設計角色碰到障礙物後扣分，並說明判斷條件。"></textarea>
            </label>
            <label>
              <span>可用素材或限制</span>
              <textarea id="materials" name="materials" rows="4" placeholder="例：使用 Scratch、投影示範、學生兩人一組，可使用教師影片複習。"></textarea>
            </label>
          </div>

          <div class="action-row">
            <button class="primary-button" type="submit">產生三個設計</button>
            <button class="secondary-button" id="resetButton" type="button">清空重來</button>
          </div>
        </form>
      </section>

      <section class="module-tabs" aria-label="功能切換">
        <button class="tab-button is-active" type="button" data-panel="tasksPanel">三軌任務產生器</button>
        <button class="tab-button" type="button" data-panel="flowPanel">課堂流程產生器</button>
        <button class="tab-button" type="button" data-panel="ticketPanel">Exit Ticket 產生器</button>
      </section>

      <section class="output-area" aria-live="polite">
        <article class="output-panel is-active" id="tasksPanel">
          <div class="panel-heading">
            <p class="section-label">Differentiated Tasks</p>
            <h2>三軌差異化任務</h2>
          </div>
          <div class="task-grid" id="taskOutput"></div>
        </article>

        <article class="output-panel" id="flowPanel">
          <div class="panel-heading">
            <p class="section-label">Sharestart Flow</p>
            <h2>學思達五環課堂流程</h2>
          </div>
          <ol class="flow-list" id="flowOutput"></ol>
        </article>

        <article class="output-panel" id="ticketPanel">
          <div class="panel-heading">
            <p class="section-label">Learning Feedback</p>
            <h2>Exit Ticket</h2>
          </div>
          <div class="ticket-list" id="ticketOutput"></div>
        </article>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
