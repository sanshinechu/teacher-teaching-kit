<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>手機常用連結</title>
    <meta name="description" content="適合手機看的教師常用連結頁，快速前往學校官網、酷課雲與我的雲端硬碟。">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="phone-page">
      <section class="link-panel" aria-labelledby="page-title">
        <header class="page-header">
          <p class="eyebrow">快速入口</p>
          <h1 id="page-title">手機常用連結</h1>
          <p>課堂、行政與備課時常用的三個入口。</p>
        </header>

        <nav class="button-list" aria-label="常用連結">
          <a class="big-button school" href="https://www.lotes.ilc.edu.tw" target="_blank" rel="noreferrer">
            <span class="button-icon" aria-hidden="true">校</span>
            <span>
              <strong>學校官網</strong>
              <small>羅東國小網站</small>
            </span>
          </a>

          <a class="big-button cloud" href="https://cooc.tp.edu.tw" target="_blank" rel="noreferrer">
            <span class="button-icon" aria-hidden="true">課</span>
            <span>
              <strong>酷課雲</strong>
              <small>線上學習平台</small>
            </span>
          </a>

          <a class="big-button drive" href="https://drive.google.com/drive/my-drive" target="_blank" rel="noreferrer">
            <span class="button-icon" aria-hidden="true">雲</span>
            <span>
              <strong>我的雲端硬碟</strong>
              <small>Google Drive</small>
            </span>
          </a>
        </nav>
      </section>
    </main>
  </body>
</html>
