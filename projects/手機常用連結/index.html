<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>手機常用連結</title>
    <meta name="description" content="適合手機看的教師常用連結頁，快速前往學校官網、快樂 e 學院與 Google 搜尋。">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="phone-page">
      <section class="link-panel" aria-labelledby="page-title">
        <header class="page-header">
          <p class="eyebrow">快速入口</p>
          <h1 id="page-title">手機常用連結</h1>
          <p>課堂、行政與學習時常用的三個入口。</p>
        </header>

        <nav class="button-list" aria-label="常用連結">
          <a class="big-button school" href="https://www.lotes.ilc.edu.tw" target="_blank" rel="noreferrer">
            <span class="button-icon" aria-hidden="true">校</span>
            <span>
              <strong>學校官網</strong>
              <small>羅東國小網站</small>
            </span>
          </a>

          <a class="big-button academy" href="https://drive.google.com/drive/my-drive" target="_blank" rel="noreferrer">
            <span class="button-icon" aria-hidden="true">學</span>
            <span>
              <strong>快樂 e 學院</strong>
              <small>學生雲端硬碟</small>
            </span>
          </a>

          <a class="big-button search" href="https://www.google.com" target="_blank" rel="noreferrer">
            <span class="button-icon" aria-hidden="true">搜</span>
            <span>
              <strong>Google 搜尋</strong>
              <small>快速查資料</small>
            </span>
          </a>
        </nav>
      </section>
    </main>
  </body>
</html>
