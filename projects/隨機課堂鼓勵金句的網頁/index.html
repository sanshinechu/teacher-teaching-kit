<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>隨機課堂鼓勵金句</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="quote-screen">
    <section class="draw-area">
      <div class="draw-stage" id="drawStage">
        <button class="draw-bucket" id="drawBucket" type="button" aria-label="點一下抽籤桶，抽出今日鼓勵金句">
          <span class="stick stick-1"></span>
          <span class="stick stick-2"></span>
          <span class="stick stick-3"></span>
          <span class="stick stick-4"></span>
          <span class="stick stick-5"></span>
          <span class="bucket-body">
            <span class="bucket-label">抽籤桶</span>
          </span>
        </button>
        <div class="rolling-stick" id="rollingStick" aria-hidden="true">
          <span>今日鼓勵</span>
        </div>
      </div>
      <p class="draw-hint" id="drawHint">點一下抽籤桶，抽出今日課堂鼓勵</p>

      <section class="quote-box is-hidden" id="quoteBox" aria-live="polite">
        <button class="reset-button" id="resetButton" type="button">重新抽籤</button>
        <p class="label">今日課堂鼓勵</p>
        <h1 id="quote"></h1>
      </section>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
